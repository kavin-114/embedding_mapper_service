erp_system: erpnext
id_type: name_string  # ERPNext uses string names as primary keys

field_map:
  invoice_number: bill_no
  invoice_date: bill_date
  vendor_name: supplier
  currency: currency
  total_amount: grand_total
  company: company
  supplier_address: supplier_address
  shipping_address: shipping_address
  billing_address: billing_address
  cost_center: cost_center
  taxes_and_charges: taxes_and_charges
  credit_to: credit_to

line_items_key: items

line_item_map:
  description: item_code
  item_name: item_name
  quantity: qty
  unit_price: rate
  uom: uom
  tax_rate: item_tax_template
  warehouse: warehouse
  expense_account: expense_account
  cost_center: cost_center

fk_fields:
  vendor_name:
    collection: vendors
    hard_key:
      metadata_field: tax_id
      source_field: vendor_tax_id
    filters:
      - category
      - region_code
      - active

  description:
    collection: items
    hard_key:
      metadata_field: item_code
      source_field: item_code
    filters:
      - hsn_code
      - uom
      - item_group
      - active

  uom:
    collection: uoms
    hard_key:
      metadata_field: uom_code
      source_field: uom
    filters: []

  tax_rate:
    collection: tax_codes
    hard_key:
      metadata_field: rate
      source_field: tax_rate
    filters:
      - rate
      - tax_type
      - component
      - active

  company:
    collection: companies
    hard_key:
      metadata_field: company_name
      source_field: company
    filters: []

  supplier_address:
    collection: addresses
    hard_key:
      metadata_field: link_supplier
      source_field: vendor_name
    filters:
      - address_type

  shipping_address:
    collection: addresses
    hard_key:
      metadata_field: link_supplier
      source_field: vendor_name
    filters:
      - is_shipping_address

  billing_address:
    collection: addresses
    hard_key:
      metadata_field: link_company
      source_field: company
    filters:
      - address_type

  cost_center:
    collection: cost_centers
    hard_key:
      metadata_field: cost_center_name
      source_field: cost_center
    filters:
      - company
      - is_group

  warehouse:
    collection: warehouses
    hard_key:
      metadata_field: warehouse_name
      source_field: warehouse
    filters:
      - company
      - is_group

  taxes_and_charges:
    collection: tax_templates
    hard_key:
      metadata_field: title
      source_field: taxes_and_charges
    filters:
      - company

# Generic tax scope → ERP-specific component mapping
# Oman: single VAT regime (no intra/inter distinction like India GST)
tax_scope_map:
  INTRA_REGION: VAT
  INTER_REGION: VAT
  IMPORT: VAT
