erp_system: erpnext
id_type: name_string  # ERPNext uses string names as primary keys

field_map:
  invoice_number: bill_no
  invoice_date: bill_date
  vendor_name: supplier
  currency: currency
  total_amount: grand_total

line_items_key: items

line_item_map:
  description: item_name
  quantity: qty
  unit_price: rate
  uom: uom
  tax_rate: item_tax_template

fk_fields:
  vendor_name:
    collection: vendors
    hard_key:
      metadata_field: gstin
      source_field: vendor_gstin
    filters:
      - category
      - state_code
      - active

  description:
    collection: items
    hard_key:
      metadata_field: item_code
      source_field: item_code
    filters:
      - hsn_code
      - uom
      - item_group
      - active

  uom:
    collection: uoms
    hard_key:
      metadata_field: uom_code
      source_field: uom
    filters: []

  tax_rate:
    collection: tax_codes
    hard_key:
      metadata_field: rate
      source_field: tax_rate
    filters:
      - rate
      - tax_type
      - component
      - active
