services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - COMPANY_COUNTRY=IN
      - COMPANY_REGION_CODE=29
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
    depends_on:
      chromadb:
        condition: service_healthy

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chroma_data:
